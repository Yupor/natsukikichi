// ── State ─────────────────────────────────────────────────────────────
var S={
  view:'home',cards:null,tags:{},reactions:{},
  sel:null,ptab:'create',etab:'edit',
  pin:'',perr:false,toast:null,
  pendingFile:null,
  _formType:'rule',_formTracks:null,_fetchStatus:null,
  _editId:null,_editType:null,_editTracks:null,_editFetchStatus:null,
  _draft:null,_savedTit:'',_savedUrl:''
};

// ── Firebase I/O ──────────────────────────────────────────────────────
function fbLoad(){
  db.ref('drops/cards').on('value',function(snap){
    var val=snap.val();
    if(val){S.cards=Object.values(val).sort(function(a,b){return a.createdAt-b.createdAt;});}
    else{S.cards=JSON.parse(JSON.stringify(SEED));SEED.forEach(function(c){db.ref('drops/cards/'+c.id).set(c);});}
    safeRender();
  },function(){S.cards=JSON.parse(JSON.stringify(SEED));safeRender();});
  db.ref('drops/tags').on('value',function(snap){S.tags=snap.val()||{};safeRender();});
  db.ref('drops/reactions').on('value',function(snap){S.reactions=snap.val()||{};safeRender();});
}
function fbSave(card){db.ref('drops/cards/'+card.id).set(card);}
function fbDel(id){db.ref('drops/cards/'+id).remove();db.ref('drops/tags/'+id).remove();db.ref('drops/reactions/'+id).remove();}
function fbTag(cid){db.ref('drops/tags/'+cid).set(S.tags[cid]||null);}
function fbReact(cid,emoji){db.ref('drops/reactions/'+cid+'/'+emoji.codePointAt(0).toString(16)).transaction(function(n){return(n||0)+1;});}

// ── Helpers ───────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fd(ts){var d=new Date(ts);return(d.getMonth()+1)+'/'+(d.getDate());}
function tc(t){return{rule:'c-rule bg-rule',lyrics:'c-lyrics bg-lyrics',drill:'c-drill bg-drill',msg:'c-msg bg-msg'}[t]||'';}
function ac(t){return{rule:'var(--rule)',lyrics:'var(--lyrics)',drill:'var(--drill)',msg:'var(--msg)'}[t]||'var(--acc)';}
function isSC(u){return u&&u.includes('soundcloud.com');}
function scEmbed(u){return'https://w.soundcloud.com/player/?url='+encodeURIComponent(u)+'&color=%23f060c0&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false&visual=true';}
function badges(c){var b='';if(c.type==='lyrics'&&isSC(c.url))b+='<span class="sc-badge">&#9834; SC</span>';if(c.file)b+='<span class="file-badge">'+(c.file.type==='image'?'IMG':'PDF')+'</span>';return b;}
function strip(h){return(h||'').replace(/<[^>]*>/g,'').replace(/&nbsp;/g,' ').trim();}

// ── Toolbar ───────────────────────────────────────────────────────────
function toolbar(){
  var cb=COLORS.map(function(c){return'<button class="rtb-color" style="background:'+c.v+'" title="'+c.l+'" onclick="fmtColor(\''+c.v+'\')" ></button>';}).join('');
  var eg=EMOJIS.map(function(e){return'<button class="emoji-btn" onclick="insEmoji(\''+e+'\')">'+e+'</button>';}).join('');
  return'<div class="rte-toolbar"><button class="rtb" id="rtb-bold" onclick="fmt(\'bold\')"><b>B</b></button><button class="rtb" id="rtb-italic" onclick="fmt(\'italic\')"><i>I</i></button><button class="rtb" id="rtb-underline" onclick="fmt(\'underline\')"><u>U</u></button><div class="rtb-sep"></div><span style="font-size:10px;color:var(--fnt);font-family:Courier New,monospace;margin-right:4px">色</span>'+cb+'<div class="rtb-sep"></div><button class="rtb" id="rtb-emoji" onclick="toggleEmoji(event)" style="font-size:14px">&#128512;</button><div class="rtb-sep"></div><button class="rtb" onclick="fmt(\'removeFormat\')" style="font-size:10px">消す</button></div><div class="emoji-panel" id="emoji-panel"><div class="emoji-grid">'+eg+'</div></div>';
}
function fmt(cmd){var r=document.getElementById('rte');if(r)r.focus();document.execCommand(cmd,false,null);syncToolbar();}
function fmtColor(v){var r=document.getElementById('rte');if(!r)return;r.focus();document.execCommand('styleWithCSS',false,true);document.execCommand('foreColor',false,v);syncToolbar();}
function syncToolbar(){['bold','italic','underline'].forEach(function(c){var b=document.getElementById('rtb-'+c);if(b)b.classList.toggle('on',document.queryCommandState(c));});}
function toggleEmoji(e){e.stopPropagation();var p=document.getElementById('emoji-panel');if(p){var on=p.classList.toggle('on');document.getElementById('rtb-emoji').classList.toggle('on',on);}}
function insEmoji(e){var r=document.getElementById('rte');if(r){r.focus();document.execCommand('insertText',false,e);}var p=document.getElementById('emoji-panel');if(p){p.classList.remove('on');document.getElementById('rtb-emoji').classList.remove('on');}}

// ── File area helper ──────────────────────────────────────────────────
function fileArea(fp,existingFile,clearFn){
  if(fp)return'<div class="file-preview"><span style="font-size:18px">'+(fp.type==='image'?'&#128444;':'&#128196;')+'</span><span class="file-preview-name">'+esc(fp.name)+'</span><button class="file-preview-rm" onclick="'+clearFn+'()">&#10005;</button></div>';
  if(existingFile)return'<div class="file-preview"><span style="font-size:18px">'+(existingFile.type==='image'?'&#128444;':'&#128196;')+'</span><span class="file-preview-name">'+esc(existingFile.name)+'</span><button class="file-preview-rm" onclick="'+clearFn+'()">&#10005;</button></div>';
  return'<label class="file-drop"><input type="file" accept="image/*,.pdf" onchange="handleFile(event)"/><span class="file-drop-lbl">&#128206; ファイルを添付する</span><span class="file-drop-sub">画像 または PDF（5MB以内）</span></label>';
}

function rNF(){

function rND(){

    ?'<div id="tracks-wrap">'+trackRows+'</div>'+(S._fetchStatus?'<div class="sc-fetch-loading">'+esc(S._fetchStatus)+'</div>':'')

  return'<div class="v"><div class="nav"><button class="nbk" onclick="go(\'home\')">&#8592; back</button><span class="ntit">ゆうこモード</span></div><div class="tabs"><div class="tab'+(t==='create'?' on':'')+'" onclick="ptab(\'create\')">作る</div><div class="tab'+(t==='manage'?' on':'')+'" onclick="ptab(\'manage\')">送った drops ('+(S.cards?S.cards.length:0)+')</div></div>'+(t==='create'?form:manage)+'</div>';

function rED(){
  var c=S.cards&&S.cards.find(function(x){return x.id===S._editId;});
  if(!c)return rPM();

function rPreview(card){
  var c=card||S._draft;
  if(!c)return'<div class="empty">— プレビューなし —</div>';
  var showSC=c.type==='lyrics'&&isSC(c.url);

}

// ── Render ────────────────────────────────────────────────────────────
function safeRender(){
  // Don't disrupt user while typing on create/edit forms
  if(S.view==='pm'&&S.ptab==='create')return;
  if(S.view==='ed')return;
  render();
}

function toggleLoop(){
  S._loop=!S._loop;
  var w=getWidget();
  if(!w)return;
  // Re-bind FINISH event for loop
  if(S._loop){
    w.bind(SC.Widget.Events.FINISH,function(){w.seekTo(0);w.play();});
  }else{
    w.unbind(SC.Widget.Events.FINISH);
  }
  render();
  if(S.view==='nd')setTimeout(function(){setupSCWidget(S.sel);},300);
}

function toggleLyricsHide(){
  S._lyricsHidden=!S._lyricsHidden;
  render();
  if(S.view==='nd')setTimeout(function(){setupSCWidget(S.sel);},300);
}

function jumpTrack(idx){
  S._activeTrackIdx=idx;
  var w=getWidget();
  if(w){try{w.skip(idx);}catch(e){}}
  render();
  if(S.view==='nd')setTimeout(function(){setupSCWidget(S.sel);},300);
}

function getWidget(){
  var iframe=document.getElementById('sc-iframe');
  if(!iframe||!window.SC)return null;
  try{return SC.Widget(iframe);}catch(e){return null;}
}

function render(){
  var h='';
  if(S.view==='home')h=rHome();
  else if(S.view==='nf')h=rNF();
  else if(S.view==='nd')h=rND();
  else if(S.view==='pp')h=rPP();
  else if(S.view==='pm')h=rPM();
  else if(S.view==='ed')h=rED();
  document.getElementById('app').innerHTML=(S.toast?'<div class="toast">'+S.toast+'</div>':'')+h;
  if(S.view==='nd')setTimeout(function(){setupSCWidget(S.sel);},300);
  var rte=document.getElementById('rte');
  if(rte){document.addEventListener('selectionchange',syncToolbar);rte.addEventListener('keyup',syncToolbar);}
}

// ── Navigation ────────────────────────────────────────────────────────
function go(v){
  if(v==='pm'){S.ptab=S.ptab||'create';S._formType=S._formType||'rule';}
  S.view=v;render();
}
function openCard(id){S.sel=id;S.view='nd';S._activeTrackIdx=0;render();}
function ptab(t){S.ptab=t;render();}
function addPin(d){if(S.pin.length<4){S.pin+=d;S.perr=false;if(S.pin.length===4)setTimeout(checkPin,120);else render();}}
function delPin(){if(S.pin.length>0){S.pin=S.pin.slice(0,-1);render();}}
function checkPin(){if(S.pin===PIN){S.perr=false;S.view='pm';S.ptab='create';S._formType='rule';S.pin='';}else{S.perr=true;S.pin='';}render();}

// ── File handling ─────────────────────────────────────────────────────
function handleFile(e){
  var f=e.target.files[0];if(!f)return;
  if(f.size>5*1024*1024){alert('5MB以内を選んでください');return;}
  var r=new FileReader();
  r.onload=function(ev){S.pendingFile={name:f.name,data:ev.target.result,type:f.type.startsWith('image/')?'image':'pdf'};render();};
  r.readAsDataURL(f);
}
function clearFile(){S.pendingFile=null;render();}
function clearEditFile(){var c=S.cards&&S.cards.find(function(x){return x.id===S._editId;});if(c)c.file=null;S.pendingFile=null;render();}
function dlFile(id){var c=S.cards&&S.cards.find(function(x){return x.id===id;});if(!c||!c.file)return;var a=document.createElement('a');a.href=c.file.data;a.download=c.file.name;a.click();}

// ── Tags & Reactions ──────────────────────────────────────────────────
function toggleTag(cid,tag){if(!S.tags[cid])S.tags[cid]=[];var i=S.tags[cid].indexOf(tag);if(i>=0)S.tags[cid].splice(i,1);else S.tags[cid].push(tag);fbTag(cid);}
function togglePicker(){var p=document.getElementById('rpicker');if(p)p.classList.toggle('on');}
function doReact(cid,emoji){fbReact(cid,emoji);var p=document.getElementById('rpicker');if(p)p.classList.remove('on');}

// ── SoundCloud Widget ─────────────────────────────────────────────────
function setupSCWidget(cardId){
  if(!window.SC)return;
  var iframe=document.getElementById('sc-iframe');if(!iframe)return;
  var c=S.cards&&S.cards.find(function(x){return x.id===cardId;});
  if(!c)return;
  try{
    var w=SC.Widget(iframe);
    function onTrackChange(){
      w.getCurrentSoundIndex(function(idx){
        if(idx===S._activeTrackIdx)return;
        S._activeTrackIdx=idx;
        // Update track list highlight and lyrics without full re-render
        document.querySelectorAll('.tl-item').forEach(function(el,i){
          el.classList.toggle('active',i===idx);
          var dot=el.querySelector('.tl-playing');
          if(i===idx&&!dot){var sp=document.createElement('span');sp.className='tl-playing';el.appendChild(sp);}
          else if(i!==idx&&dot)dot.remove();
          el.querySelector('.tl-title').style.color=i===idx?'var(--lyrics)':'';
        });
        // Update lyrics box
        var lyricsBox=document.querySelector('.lyrics-text');
        if(lyricsBox&&c.tracks&&c.tracks[idx]){
          lyricsBox.textContent=c.tracks[idx].lyrics||'';
        }
        var emptyEl=document.querySelector('.lyrics-empty');
        if(emptyEl&&c.tracks&&c.tracks[idx]&&c.tracks[idx].lyrics){
          emptyEl.style.display='none';
          if(lyricsBox)lyricsBox.style.display='';
        }
      });
    }
    w.bind(SC.Widget.Events.PLAY,onTrackChange);
    w.bind(SC.Widget.Events.PLAY_PROGRESS,onTrackChange);
    if(S._loop){
      w.bind(SC.Widget.Events.FINISH,function(){w.seekTo(0);w.play();});
    }
  }catch(e){console.warn('SC Widget:',e);}
}

function getSoundTitle(s){
  if(!s)return null;
  // Try all known field names
  return s.title||s.label||s.name||(s.user&&s.user.username?s.user.username+' - '+s.id:null)||null;
}

function fetchTracks(){
  if(!window.SC){alert('SoundCloud APIが読み込まれていません');return;}
  var urlEl=document.getElementById('curl');
  var titEl=document.getElementById('ctit');
  var url=urlEl?urlEl.value.trim():'';
  var tit=titEl?titEl.value:'';
  if(!url){alert('URLを入力してください');return;}
  S._fetchStatus='読み込み中...';render();
  setTimeout(function(){
    var el=document.getElementById('curl');if(el)el.value=url;
    var t=document.getElementById('ctit');if(t)t.value=tit;
    var iframe=document.getElementById('sc-hidden-iframe');if(!iframe)return;
    iframe.src='https://w.soundcloud.com/player/?url='+encodeURIComponent(url)+'&auto_play=false';
    var w=SC.Widget(iframe);
    w.bind(SC.Widget.Events.READY,function(){
      w.getSounds(function(sounds){
        if(!sounds||!sounds.length){S._fetchStatus='曲が見つかりませんでした';render();return;}
        // Build tracks - if title missing, use index-based seek
        var total=sounds.length;
        var tracks=sounds.map(function(s,i){
          var title=getSoundTitle(s)||null;
          return{title:title,lyrics:'',index:i,_needsTitle:!title};
        });
        // For tracks missing titles, seek and get currentSound
        var pending=tracks.filter(function(t){return t._needsTitle;});
        if(pending.length===0){
          S._formTracks=tracks.map(function(t,i){return{title:t.title||('Track '+(i+1)),lyrics:'',index:i};});
          S._fetchStatus=null;render();
          setTimeout(function(){var el=document.getElementById('curl');if(el)el.value=url;var t2=document.getElementById('ctit');if(t2)t2.value=tit;},30);
        } else {
          // fallback: skip to each track and read title
          var results=tracks.map(function(t){return{title:t.title,lyrics:'',index:t.index};});
          var idx=0;
          function nextTrack(){
            if(idx>=total){
              S._formTracks=results.map(function(r,i){if(!r.title)r.title='Track '+(i+1);return r;});
              S._fetchStatus=null;render();
              setTimeout(function(){var el=document.getElementById('curl');if(el)el.value=url;var t2=document.getElementById('ctit');if(t2)t2.value=tit;},30);
              return;
            }
            w.skip(idx);
            setTimeout(function(){
              w.getCurrentSound(function(sound){
                var t=getSoundTitle(sound);
                if(t&&!results[idx].title)results[idx].title=t;
                idx++;nextTrack();
              });
            },300);
          }
          nextTrack();
        }
        setTimeout(function(){var el=document.getElementById('curl');if(el)el.value=url;var t=document.getElementById('ctit');if(t)t.value=tit;},30);
      });
    });
  },80);
}

function fetchTracksEdit(){
  if(!window.SC)return;
  var urlEl=document.getElementById('curl');
  var titEl=document.getElementById('ctit');
  var url=urlEl?urlEl.value.trim():'';
  var tit=titEl?titEl.value:'';
  if(!url){alert('URLを入力してください');return;}
  S._editFetchStatus='読み込み中...';render();
  setTimeout(function(){
    var el=document.getElementById('curl');if(el)el.value=url;
    var t=document.getElementById('ctit');if(t)t.value=tit;
    var iframe=document.getElementById('sc-hidden-iframe-edit');if(!iframe)return;
    iframe.src='https://w.soundcloud.com/player/?url='+encodeURIComponent(url)+'&auto_play=false';
    var w=SC.Widget(iframe);
    w.bind(SC.Widget.Events.READY,function(){
      w.getSounds(function(sounds){
        if(!sounds||!sounds.length){S._editFetchStatus='曲が見つかりませんでした';render();return;}
        var total=sounds.length;
        var oldTracks=S._editTracks||[];
        var results=new Array(total);
        function tryNext(i){
          if(i>=total){
            S._editTracks=results.map(function(r,idx){
              var title=r||('Track '+(idx+1));
              var ex=oldTracks.find(function(t){return t.title===title;});
              return{title:title,lyrics:ex?ex.lyrics:'',index:idx};
            });
            S._editFetchStatus=null;render();
            setTimeout(function(){var el=document.getElementById('curl');if(el)el.value=url;var t2=document.getElementById('ctit');if(t2)t2.value=tit;},30);
            return;
          }
          w.skip(i);
          setTimeout(function(){
            w.getCurrentSound(function(sound){
              results[i]=sound?(sound.title||sound.label||sound.name||null):null;
              tryNext(i+1);
            });
          },600);
        }
        tryNext(0);
      });
    });
  },80);
}

function updEditLyrics(i,v){if(S._editTracks&&S._editTracks[i])S._editTracks[i].lyrics=v;}

// ── Type change ───────────────────────────────────────────────────────
function onTypeChange(val){
  S._formType=val;
  S._formTracks=val==='lyrics'?[]:null;
  S._fetchStatus=null;
  render();
  setTimeout(function(){var t=document.getElementById('ctit');if(t&&S._savedTit)t.value=S._savedTit;var u=document.getElementById('curl');if(u&&S._savedUrl)u.value=S._savedUrl;},30);
}
function onEditTypeChange(val){
  var tit=document.getElementById('ctit');
  var url=document.getElementById('curl');
  var rte=document.getElementById('rte');
  S._savedTit=tit?tit.value:'';
  S._savedUrl=url?url.value:'';
  var c=S.cards&&S.cards.find(function(x){return x.id===S._editId;});
  if(c&&rte)c.content=rte.innerHTML;
  S._editType=val;
  render();
  setTimeout(function(){var t=document.getElementById('ctit');if(t)t.value=S._savedTit;var u=document.getElementById('curl');if(u)u.value=S._savedUrl;},30);
}

// ── Edit tab switch ───────────────────────────────────────────────────
function switchEtab(tab){
  if(tab==='preview'){
    var c=S.cards&&S.cards.find(function(x){return x.id===S._editId;});
    if(c){
      var tit=document.getElementById('ctit');
      var url=document.getElementById('curl');
      var rte=document.getElementById('rte');
      var ta=document.querySelectorAll('.track-row textarea');
      if(tit)c.title=tit.value;
      if(url)c.url=url.value;
      if(rte)c.content=rte.innerHTML;
      ta.forEach(function(el,i){if(S._editTracks&&S._editTracks[i])S._editTracks[i].lyrics=el.value;});
      S._draft=JSON.parse(JSON.stringify(c));
    }
  }
  S.etab=tab;render();
  if(tab==='edit'){setTimeout(function(){var t=document.getElementById('ctit');if(t&&S._draft)t.value=S._draft.title||'';var u=document.getElementById('curl');if(u&&S._draft)u.value=S._draft.url||'';},30);}
}

// ── Create card ───────────────────────────────────────────────────────
function createCard(){
  var type=document.getElementById('ct').value;
  var title=(document.getElementById('ctit').value||'').trim();
  var url=(document.getElementById('curl').value||'').trim();
  if(!title){alert('タイトルを入力してください');return;}
  var content='',rich=false,tracks=null;
  if(type==='lyrics'){
    tracks=S._formTracks||[];
  }else{
    var rte=document.getElementById('rte');
    content=rte?rte.innerHTML.trim():'';
    rich=true;
  }
  var card={id:Date.now().toString(36)+Math.random().toString(36).slice(2),type:type,title:title,content:content,rich:rich,tracks:tracks,url:url||null,file:S.pendingFile||null,createdAt:Date.now()};
  S.pendingFile=null;S._formTracks=null;S._fetchStatus=null;S._savedTit='';S._savedUrl='';
  fbSave(card);
  S.toast='dropped!';render();
  setTimeout(function(){S.toast=null;render();},1800);
}

// ── Update card ───────────────────────────────────────────────────────
function updateCard(){
  var c=S.cards&&S.cards.find(function(x){return x.id===S._editId;});
  if(!c)return;
  var tit=document.getElementById('ctit');
  var url=document.getElementById('curl');
  var rte=document.getElementById('rte');
  var ta=document.querySelectorAll('.track-row textarea');
  if(tit)c.title=tit.value.trim()||c.title;
  if(url)c.url=url.value.trim()||null;
  if(S._editTracks){ta.forEach(function(el,i){if(S._editTracks[i])S._editTracks[i].lyrics=el.value;});c.tracks=S._editTracks;}
  else if(rte){c.content=rte.innerHTML;c.rich=true;}
  if(S.pendingFile)c.file=S.pendingFile;
  if(!c.title){alert('タイトルを入力してください');return;}
  S.pendingFile=null;S._draft=null;S._editTracks=null;S._editFetchStatus=null;
  fbSave(c);
  S.toast='保存しました！';S.view='pm';S.ptab='manage';S.etab='edit';render();
  setTimeout(function(){S.toast=null;render();},1800);
}

// ── Edit card ─────────────────────────────────────────────────────────
function openEdit(id){
  S._editId=id;S._editType=null;S._draft=null;S.etab='edit';
  S.pendingFile=null;S._editFetchStatus=null;
  var c=S.cards&&S.cards.find(function(x){return x.id===id;});
  S._editTracks=c&&c.tracks&&c.tracks.length?JSON.parse(JSON.stringify(c.tracks)):null;
  S.view='ed';render();
}

// ── Delete card ───────────────────────────────────────────────────────
function delCard(id){if(!confirm('削除しますか？'))return;fbDel(id);}

// ── Boot ──────────────────────────────────────────────────────────────
render();fbLoad();
</script>
