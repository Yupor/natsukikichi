<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DROPS</title>
<style>
:root{
  --bg:#070b12;--s1:#0e1420;--s2:#141c2e;
  --bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.14);
  --txt:#f0ede6;--mut:rgba(240,237,230,0.42);--fnt:rgba(240,237,230,0.18);
  --acc:#00f0be;
  --rule:#00f0be;--lyrics:#f060c0;--drill:#f0b030;--msg:#3090f0;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);}
#app{background:var(--bg);min-height:100vh;max-width:480px;margin:0 auto;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:var(--txt);position:relative;}
#app::before{content:'';position:fixed;inset:0;max-width:480px;margin:0 auto;background-image:linear-gradient(rgba(255,255,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0;}
.v{position:relative;z-index:1;animation:fi .18s ease;}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.home{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;gap:2rem;}
.logo-word{font-family:'Courier New',monospace;font-size:56px;font-weight:700;letter-spacing:0.18em;color:var(--txt);display:block;line-height:1;}
.logo-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--acc);margin-left:2px;vertical-align:super;}
.logo-sub{font-size:10px;letter-spacing:0.22em;color:var(--mut);margin-top:10px;text-transform:uppercase;font-family:'Courier New',monospace;}
.hbtns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:260px;}
.mbtn{background:var(--s1);border:1px solid var(--bdr2);border-radius:12px;padding:15px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:border-color .15s,background .15s;text-align:left;width:100%;}
.mbtn:hover{background:var(--s2);border-color:rgba(255,255,255,0.22);}
.mico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;font-family:'Courier New',monospace;}
.ico-n{background:rgba(0,240,190,0.1);color:var(--acc);border:1px solid rgba(0,240,190,0.25);}
.ico-y{background:rgba(240,96,192,0.1);color:var(--lyrics);border:1px solid rgba(240,96,192,0.25);}
.mname{font-size:15px;font-weight:600;color:var(--txt);margin-bottom:2px;}
.mdesc{font-size:12px;color:var(--mut);}

.nav{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:10;background:rgba(7,11,18,0.92);backdrop-filter:blur(8px);}
.nbk{background:none;border:none;cursor:pointer;color:var(--mut);font-size:12px;font-family:'Courier New',monospace;padding:4px 0;transition:color .12s;letter-spacing:0.05em;}
.nbk:hover{color:var(--txt);}
.ntit{flex:1;font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--mut);font-family:'Courier New',monospace;}
.ncnt{font-size:10px;padding:3px 9px;border-radius:20px;background:var(--s1);border:1px solid var(--bdr2);color:var(--mut);font-family:'Courier New',monospace;}

.feed{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:11px 14px 11px 0;cursor:pointer;display:flex;align-items:stretch;transition:border-color .12s,background .12s;overflow:hidden;}
.card:hover{background:var(--s2);border-color:var(--bdr2);}
.cacc{width:3px;flex-shrink:0;margin-right:12px;}
.cbody{flex:1;min-width:0;}
.chead{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
.ttag{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;font-family:'Courier New',monospace;padding:2px 7px;border-radius:4px;flex-shrink:0;}
.ctit{font-size:13px;font-weight:600;color:var(--txt);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.cprev{font-size:12px;color:var(--mut);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.cfoot{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
.cdate{font-size:10px;color:var(--fnt);font-family:'Courier New',monospace;}
.tags{display:flex;gap:4px;flex-wrap:wrap;}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid var(--bdr2);color:var(--mut);font-family:'Courier New',monospace;}
.sc-badge{font-size:9px;padding:2px 7px;border-radius:4px;background:rgba(240,96,192,0.1);color:var(--lyrics);font-family:'Courier New',monospace;border:1px solid rgba(240,96,192,0.2);}
.file-badge{font-size:9px;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,0.06);color:var(--mut);font-family:'Courier New',monospace;border:1px solid var(--bdr);}

.c-rule{color:var(--rule);}.bg-rule{background:rgba(0,240,190,0.1);}
.c-lyrics{color:var(--lyrics);}.bg-lyrics{background:rgba(240,96,192,0.1);}
.c-drill{color:var(--drill);}.bg-drill{background:rgba(240,176,48,0.1);}
.c-msg{color:var(--msg);}.bg-msg{background:rgba(48,144,240,0.1);}

.det{padding:1.5rem 16px 3rem;}
.det-type{font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:8px;display:block;}
.det-tit{font-size:22px;font-weight:700;color:var(--txt);margin-bottom:14px;line-height:1.25;}
.det-div{border:none;border-top:1px solid var(--bdr);margin-bottom:16px;}
.sc-player{margin-bottom:1.2rem;border-radius:10px;overflow:hidden;border:1px solid rgba(240,96,192,0.2);}
.sc-player-lbl{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--lyrics);font-family:'Courier New',monospace;padding:8px 12px 6px;background:rgba(240,96,192,0.06);display:flex;align-items:center;gap:6px;}
.sc-player-lbl::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--lyrics);}
.sc-player iframe{display:block;width:100%;border:none;}
.lyrics-lbl{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--mut);font-family:'Courier New',monospace;margin-bottom:10px;}
.track-title-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(240,96,192,0.06);border-radius:8px;border:1px solid rgba(240,96,192,0.15);margin-bottom:10px;}
.track-title-dot{width:6px;height:6px;border-radius:50%;background:var(--lyrics);flex-shrink:0;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.track-title-text{font-size:12px;font-weight:500;color:var(--lyrics);flex:1;}
.track-row{background:var(--s1);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
.track-row-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.track-num{font-size:9px;font-family:'Courier New',monospace;color:var(--mut);flex-shrink:0;white-space:nowrap;}
.track-name{font-size:12px;font-weight:500;color:var(--lyrics);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.sc-fetch-btn{padding:8px 14px;border:1px solid rgba(240,96,192,0.4);border-radius:8px;background:rgba(240,96,192,0.07);color:var(--lyrics);font-size:11px;font-family:'Courier New',monospace;cursor:pointer;transition:all .1s;width:100%;}
.sc-fetch-btn:hover{background:rgba(240,96,192,0.15);}
.sc-fetch-loading{font-size:11px;color:var(--mut);font-family:'Courier New',monospace;padding:8px 0;text-align:center;}
.sc-hidden-player{position:absolute;opacity:0;pointer-events:none;height:1px;overflow:hidden;}
.det-body{font-size:14px;color:rgba(240,237,230,0.82);line-height:2;margin-bottom:1.2rem;}
.det-body div,.det-body p{min-height:1em;}
.det-body b,.det-body strong{font-weight:700;color:var(--txt);}
.det-link{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--s1);border-radius:8px;border:1px solid var(--bdr2);font-size:11px;color:var(--acc);margin-bottom:1rem;font-family:'Courier New',monospace;word-break:break-all;text-decoration:none;transition:border-color .12s;}
.det-link:hover{border-color:var(--acc);}
.att-img{width:100%;border-radius:8px;border:1px solid var(--bdr);margin-bottom:1rem;display:block;}
.att-pdf{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--s1);border-radius:8px;border:1px solid var(--bdr2);margin-bottom:1rem;cursor:pointer;}
.att-pdf-icon{font-size:22px;flex-shrink:0;}
.att-pdf-meta{flex:1;min-width:0;}
.att-pdf-name{font-size:12px;color:var(--txt);font-family:'Courier New',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.att-pdf-sub{font-size:10px;color:var(--mut);}
.att-pdf-dl{font-size:10px;color:var(--acc);font-family:'Courier New',monospace;flex-shrink:0;}
.tagsec{border-top:1px solid var(--bdr);padding-top:1rem;margin-top:0.5rem;}
.taglbl{font-size:9px;color:var(--fnt);letter-spacing:0.18em;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:10px;}
.tagopts{display:flex;gap:6px;flex-wrap:wrap;}
.tbtn{font-size:11px;padding:6px 14px;border-radius:20px;border:1px solid var(--bdr2);color:var(--mut);background:none;cursor:pointer;font-family:'Courier New',monospace;transition:all .1s;}
.tbtn:hover{background:var(--s1);color:var(--txt);}
.tbtn.on{border-color:var(--acc);color:var(--acc);background:rgba(0,240,190,0.07);}

.pin{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 50px);padding:2rem;gap:14px;}
.pin-lg{font-family:'Courier New',monospace;font-size:26px;font-weight:700;letter-spacing:0.18em;color:var(--lyrics);margin-bottom:4px;}
.pin-lbl{font-size:10px;color:var(--mut);letter-spacing:0.15em;text-transform:uppercase;font-family:'Courier New',monospace;}
.pin-dots{display:flex;gap:10px;margin:4px 0;}
.pdot{width:12px;height:12px;border-radius:50%;border:1px solid var(--bdr2);transition:all .1s;}
.pdot.on{background:var(--lyrics);border-color:var(--lyrics);}
.pin-err{font-size:11px;color:#f07070;font-family:'Courier New',monospace;}
.npad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:192px;}
.nbt{background:var(--s1);border:1px solid var(--bdr2);border-radius:10px;padding:13px;cursor:pointer;font-size:17px;font-weight:600;color:var(--txt);transition:background .1s;font-family:'Courier New',monospace;text-align:center;}
.nbt:hover{background:var(--s2);}
.nbt:active{transform:scale(0.94);}

.tabs{display:flex;border-bottom:1px solid var(--bdr);}
.tab{flex:1;padding:11px 8px;text-align:center;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--mut);cursor:pointer;font-family:'Courier New',monospace;border-bottom:2px solid transparent;transition:color .12s;}
.tab.on{color:var(--txt);border-bottom-color:var(--acc);}

.form{padding:16px;display:flex;flex-direction:column;gap:14px;padding-bottom:3rem;}
.fl{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--mut);margin-bottom:5px;display:block;font-family:'Courier New',monospace;}
.fi,.fs{width:100%;padding:10px 12px;background:var(--s1);border:1px solid var(--bdr2);border-radius:8px;color:var(--txt);font-size:13px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;outline:none;transition:border-color .12s;}
.fi:focus,.fs:focus{border-color:rgba(255,255,255,0.32);}

/* ── Rich text editor ── */
.rte-wrap{border:1px solid var(--bdr2);border-radius:8px;overflow:hidden;}
.rte-toolbar{display:flex;gap:4px;padding:6px 8px;background:var(--s2);border-bottom:1px solid var(--bdr);flex-wrap:wrap;align-items:center;}
.rtb{background:none;border:1px solid transparent;border-radius:5px;cursor:pointer;padding:4px 8px;font-size:12px;color:var(--mut);transition:all .1s;font-family:'Courier New',monospace;line-height:1;}
.rtb:hover{background:var(--s1);color:var(--txt);border-color:var(--bdr2);}
.rtb.on{background:rgba(0,240,190,0.1);color:var(--acc);border-color:rgba(0,240,190,0.3);}
.rtb-sep{width:1px;height:16px;background:var(--bdr2);margin:0 2px;flex-shrink:0;}
.rtb-color{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:border-color .1s;}
.rtb-color:hover,.rtb-color.on{border-color:rgba(255,255,255,0.6);}
.emoji-panel{background:var(--s2);border-bottom:1px solid var(--bdr);padding:8px;}
.emoji-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;}
.emoji-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:4px;border-radius:6px;transition:background .1s;text-align:center;}
.emoji-btn:hover{background:var(--s1);}
.rte-body div,.rte-body p{min-height:1em;}
.rte-body{min-height:100px;padding:10px 12px;background:var(--s1);color:rgba(240,237,230,0.82);font-size:13px;line-height:1.85;outline:none;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
.rte-body b,.rte-body strong{color:var(--txt);}
.rte-body:empty::before{content:attr(data-placeholder);color:var(--fnt);pointer-events:none;}

.file-drop{border:1px dashed var(--bdr2);border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:border-color .12s;}
.file-drop:hover{border-color:rgba(255,255,255,0.3);}
.file-drop input{display:none;}
.file-drop-lbl{font-size:11px;color:var(--mut);font-family:'Courier New',monospace;display:block;margin-bottom:3px;}
.file-drop-sub{font-size:10px;color:var(--fnt);}
.file-preview{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(0,240,190,0.05);border:1px solid rgba(0,240,190,0.2);border-radius:8px;}
.file-preview-name{font-size:11px;color:var(--acc);font-family:'Courier New',monospace;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.file-preview-rm{background:none;border:none;color:var(--mut);cursor:pointer;font-size:13px;padding:2px;}
.bsend{padding:13px;border-radius:10px;background:var(--acc);border:none;color:#060a10;font-size:13px;font-weight:700;cursor:pointer;width:100%;letter-spacing:0.1em;text-transform:uppercase;font-family:'Courier New',monospace;transition:opacity .12s;}
.bsend:hover{opacity:0.86;}
.mcard{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:11px 13px;display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}
.mcb{flex:1;min-width:0;}
.bedit{background:none;border:1px solid var(--bdr2);color:var(--mut);border-radius:6px;font-size:10px;padding:4px 10px;cursor:pointer;font-family:'Courier New',monospace;flex-shrink:0;transition:all .1s;}
.bedit:hover{background:var(--s2);color:var(--txt);}
.bdel{background:none;border:1px solid rgba(240,80,80,0.25);color:rgba(240,80,80,0.6);border-radius:6px;font-size:10px;padding:4px 10px;cursor:pointer;font-family:'Courier New',monospace;flex-shrink:0;transition:all .1s;}
.bdel:hover{background:rgba(240,80,80,0.08);border-color:rgba(240,80,80,0.55);color:#f05050;}
.empty{text-align:center;padding:3rem 1rem;color:var(--fnt);font-size:12px;font-family:'Courier New',monospace;letter-spacing:0.06em;}
.toast{background:var(--acc);color:#060a10;text-align:center;padding:10px;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;font-family:'Courier New',monospace;position:sticky;top:0;z-index:20;}
.preview-wrap{padding:1rem 16px 3rem;border-top:1px solid var(--bdr);}
.preview-card{background:var(--s1);border:1px solid var(--bdr2);border-radius:12px;padding:1rem 14px;}

.reactions{margin-bottom:1.2rem;}
.react-lbl{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--mut);font-family:'Courier New',monospace;margin-bottom:8px;}
.react-row{display:flex;gap:6px;flex-wrap:wrap;}
.react-btn{background:var(--s1);border:1px solid var(--bdr2);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:15px;transition:all .1s;display:flex;align-items:center;gap:5px;}
.react-btn:hover{background:var(--s2);border-color:var(--bdr2);}
.react-count{font-size:11px;font-family:'Courier New',monospace;color:var(--mut);}
.react-add{background:none;border:1px dashed var(--bdr2);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:12px;color:var(--mut);font-family:'Courier New',monospace;transition:all .1s;}
.react-add:hover{background:var(--s1);color:var(--txt);}
.react-picker{background:var(--s2);border:1px solid var(--bdr2);border-radius:10px;padding:8px;margin-top:6px;display:none;}
.react-picker.on{display:block;}
.react-picker-grid{display:flex;flex-wrap:wrap;gap:4px;}
.react-pick-btn{background:none;border:none;cursor:pointer;font-size:20px;padding:4px;border-radius:6px;transition:background .1s;}
.react-pick-btn:hover{background:var(--s1);}
</style>
</head>
<body>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://w.soundcloud.com/player/api.js"></script>
<div id="app"></div>
<script>
const firebaseConfig={
  apiKey:"AIzaSyAWKQMRQREp765mBbjHHvntnkPF-PV3MMs",
  authDomain:"natsukikich.firebaseapp.com",
  databaseURL:"https://natsukikich-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"natsukikich",
  storageBucket:"natsukikich.firebasestorage.app",
  messagingSenderId:"897484879290",
  appId:"1:897484879290:web:dd104398870f0209801983"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const PIN='0925';
const TYPES={rule:'ルール',lyrics:'歌詞',drill:'ドリル',msg:'メッセージ'};
const TATAGS=['重要','お気に入り','復習','できた!'];
const REACT_EMOJIS=['👍','❤️','🔥','😊','🎵','✨','💪','🤩','😂','🥺','👏','🌟'];
const RICH_TYPES=['rule','lyrics','drill','msg'];
const COLORS=[
  {v:'#f060c0',label:'ピンク'},
  {v:'#00f0be',label:'グリーン'},
  {v:'#f0b030',label:'イエロー'},
  {v:'#3090f0',label:'ブルー'},
  {v:'#f07070',label:'レッド'},
  {v:'#c0a0ff',label:'パープル'},
];

const SEED=[
  {id:'seed-rule-001',type:'rule',title:'タブレットの使用ルール',
   content:'使っていいとき\n・勉強・調べもの（ChatGPT、学習アプリ、辞書）はOK\n・宿題が終わったあと\n\n時間のルール\n・平日は1日1時間まで（21時以降は使わない）\n・休日は2時間まで（外出・運動のあとに使う）\n\nやっていいこと・だめなこと\n・アプリの追加はお母さんに相談\n・ゲーム・SNS・YouTube（勉強以外）はなし\n・個人情報（名前・学校・住所）は入力しない\n\n大切にすること\n・食事中・お風呂では使わない\n・充電スポットはリビング\n・使い終わったら元の場所に戻す',
   rich:false,url:null,file:null,createdAt:Date.now()-86400000*3},
  {id:'seed-lyrics-001',type:'lyrics',title:'日本史の歌',
   content:'曲を聴きながら<b style="color:#f060c0">歌詞</b>を覚えよう！',
   rich:true,url:'https://soundcloud.com/yupor/sets/noiand3f840r',file:null,createdAt:Date.now()-86400000*2},
  {id:'seed-lyrics-002',type:'lyrics',title:'理科の歌',
   content:'曲を聴きながら<b style="color:#00f0be">覚えよう！</b>',
   rich:true,url:'https://soundcloud.com/yupor/sets/akinqrleepmg',file:null,createdAt:Date.now()-86400000*1}
];

let S={view:'home',cards:[],tags:{},sel:null,ptab:'create',etab:'edit',pin:'',perr:false,toast:null,pendingFile:null};

function scEmbedUrl(url){
  return'https://w.soundcloud.com/player/?url='+encodeURIComponent(url)+'&color=%23f060c0&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false&visual=true';
}
function load(){
  S.cards=null;
  db.ref('drops/cards').on('value',function(snap){
    var val=snap.val();
    if(val){
      S.cards=Object.values(val).sort(function(a,b){return a.createdAt-b.createdAt;});
    } else {
      S.cards=JSON.parse(JSON.stringify(SEED));
      SEED.forEach(function(c){db.ref('drops/cards/'+c.id).set(c);});
    }
    render();
  },function(err){
    console.error('Firebase error:',err);
    if(!S.cards){S.cards=JSON.parse(JSON.stringify(SEED));}
    render();
  });
  db.ref('drops/tags').on('value',function(snap){
    S.tags=snap.val()||{};
    render();
  });
  db.ref('drops/reactions').on('value',function(snap){
    S.reactions=snap.val()||{};
    render();
  });
}
function save(card){

}
function saveT(cid){

}
function saveReaction(cid,emoji){

function encodeEmoji(e){return e.codePointAt(0).toString(16);}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fd(ts){const d=new Date(ts);return(d.getMonth()+1)+'/'+d.getDate();}
function tc(t){return{rule:'c-rule bg-rule',lyrics:'c-lyrics bg-lyrics',drill:'c-drill bg-drill',msg:'c-msg bg-msg'}[t]||'';}

function getEditDraft(){
  // read current form values into a draft object
  if(!S.cards)return null;
  var c=S.cards.find(function(x){return x.id===S._editId;});
  if(!c)return null;
  var type=(document.getElementById('ct')||{}).value||S._editType||c.type;
  var title=((document.getElementById('ctit')||{}).value||'').trim()||c.title;
  var url=((document.getElementById('curl')||{}).value||'').trim()||c.url||'';
  var rich=isRich(type);
  var content='';
  if(rich){var rte=document.getElementById('rte');content=rte?rte.innerHTML:c.content||'';}
  else{var ta=document.getElementById('ccont');content=ta?ta.value:c.content||'';}
  return{id:c.id,type:type,title:title,content:content,rich:rich,url:url||null,file:S.pendingFile||c.file||null,createdAt:c.createdAt,reactions:c.reactions||null};
}

function switchEtab(tab){
  if(tab==='preview'){
    // snapshot current values before switching
    S._draft=getEditDraft();
  }
  S.etab=tab;render();
  if(tab==='edit'){
    // restore form values
    setTimeout(function(){
      var d=S._draft||S.cards&&S.cards.find(function(x){return x.id===S._editId;});
      if(!d)return;
      var t=document.getElementById('ctit');if(t)t.value=d.title||'';
      var u=document.getElementById('curl');if(u)u.value=d.url||'';
      var rte=document.getElementById('rte');if(rte)rte.innerHTML=d.content||'';
      var ta=document.getElementById('ccont');if(ta)ta.value=d.content||'';
    },30);
  }

function openEdit(id){
  S._editId=id;
  S._editType=null;
  S._draft=null;
  S.etab='edit';
  S.pendingFile=null;
  S._editTracks=null;
  S._editFetchStatus=null;
  // pre-load existing tracks from card
  var c=S.cards&&S.cards.find(function(x){return x.id===id;});
  if(c&&c.tracks&&c.tracks.length)S._editTracks=JSON.parse(JSON.stringify(c.tracks));

function onEditTypeChange(val){
  // save current values before re-render
  var tit=document.getElementById('ctit');
  var url=document.getElementById('curl');
  var rte=document.getElementById('rte');
  var ta=document.getElementById('ccont');
  S._savedTit=tit?tit.value:'';
  S._savedUrl=url?url.value:'';
  S._savedContent=rte?rte.innerHTML:(ta?ta.value:'');
  S._editType=val;
  // update card content temporarily so rED shows saved content
  var c=S.cards&&S.cards.find(function(x){return x.id===S._editId;});
  if(c){c.content=S._savedContent;}
  render();
  // restore title/url
  var t2=document.getElementById('ctit');

  if(t2)t2.value=S._savedTit||'';

function clearEditFile(){
  var c=S.cards&&S.cards.find(function(x){return x.id===S._editId;});
  if(c)c.file=null;
  S.pendingFile=null;
  render();
}
function updateEditTrackLyrics(i,v){
  if(!S._editTracks)return;
  S._editTracks[i].lyrics=v;
}

function fetchSCTracksEdit(){
  if(!window.SC)return;
  var urlEl=document.getElementById('curl');
  var url=urlEl?urlEl.value.trim():'';
  var titEl=document.getElementById('ctit');
  var savedTit=titEl?titEl.value:'';
  if(!url){alert('SoundCloudのURLを入力してください');return;}
  S._editFetchStatus='読み込み中...';render();
  setTimeout(function(){
    var el=document.getElementById('curl');if(el)el.value=url;
    var t=document.getElementById('ctit');if(t)t.value=savedTit;
    var iframe=document.getElementById('sc-hidden-iframe-edit');
    if(!iframe)return;
    iframe.src='https://w.soundcloud.com/player/?url='+encodeURIComponent(url)+'&auto_play=false';
    var widget=SC.Widget(iframe);
    widget.bind(SC.Widget.Events.READY,function(){
      widget.getSounds(function(sounds){
        if(!sounds||!sounds.length){S._editFetchStatus='曲が見つかりませんでした';render();return;}
        // preserve existing lyrics by matching titles
        var oldTracks=S._editTracks||[];
        S._editTracks=sounds.map(function(s,i){
          var existing=oldTracks.find(function(t){return t.title===s.title;});
          return{title:s.title||('Track '+(i+1)),lyrics:existing?existing.lyrics:'',index:i};
        });
        S._editFetchStatus=null;
        render();
        setTimeout(function(){
          var el=document.getElementById('curl');if(el)el.value=url;
          var t=document.getElementById('ctit');if(t)t.value=savedTit;
        },30);
      });
    });
  },80);
}

function updateCard(){
  var c=S.cards&&S.cards.find(function(x){return x.id===S._editId;});
  if(!c)return;
  // use draft if we're in preview tab, otherwise read from form
  var d=S._draft||getEditDraft();
  if(!d||!d.title){alert('タイトルを入力してください');return;}
  // save lyrics from DOM before reading
  if(c.type==='lyrics'||d.type==='lyrics'){
    var rows=document.querySelectorAll('.track-row');
    rows.forEach(function(row,i){
      var ta=row.querySelector('textarea');
      if(S._editTracks&&S._editTracks[i]&&ta)S._editTracks[i].lyrics=ta.value;
    });
    if(S._editTracks&&S._editTracks.length)c.tracks=S._editTracks;
  }
  c.type=d.type;c.title=d.title;c.content=d.content;c.rich=d.rich;
  c.url=d.url||null;
  if(d.file)c.file=d.file;
  S.pendingFile=null;S._draft=null;S._editTracks=null;S._editFetchStatus=null;
  save(c);
  S.toast='保存しました！';S.view='pm';S.ptab='manage';S.etab='edit';render();
  setTimeout(function(){S.toast=null;render();},1800);
}

    '<div><label class="fl">タイトル</label><input class="fi" type="text" id="ctit" placeholder="例：日本史の歌"/></div>'+
    '<div><label class="fl">内容'+(showRich?' <span style="font-size:9px;color:var(--acc);font-family:\'Courier New\',monospace">— 太字・色編集対応</span>':'')+'</label>'+contentField+'</div>'+
    '<div><label class="fl">SoundCloud URL（歌詞カードに貼るとプレイヤーが表示されます）</label><input class="fi" type="url" id="curl" placeholder="https://on.soundcloud.com/..."/></div>'+
    '<div><label class="fl">ファイル添付（任意）</label>'+fileArea+'</div>'+
    '<button class="bsend" onclick="createCard()">drop する &#8595;</button>'+
  '</div>';

  var cs=S.cards?[...S.cards].reverse():[];
  var manage=cs.length
    ?'<div style="padding:12px 14px">'+cs.map(function(c){
        return'<div class="mcard"><div class="cacc" style="background:'+ac(c.type)+';width:3px;flex-shrink:0;margin-right:10px;border-radius:2px;align-self:stretch;"></div><div class="mcb"><div class="chead"><span class="ttag '+tc(c.type)+'">'+TYPES[c.type]+'</span><span class="ctit">'+esc(c.title)+'</span>'+cardBadges(c)+'</div><div style="font-family:\'Courier New\',monospace;font-size:10px;color:var(--fnt);margin-top:4px">'+fd(c.createdAt)+'</div></div><div style="display:flex;gap:5px;flex-shrink:0"><button class="bedit" onclick="openEdit(\''+c.id+'\')">編集</button><button class="bdel" onclick="delCard(\''+c.id+'\')">削除</button></div></div>';
      }).join('')+'</div>'
    :'<div class="empty">— まだ drops はありません —</div>';

  return'<div class="v"><div class="nav"><button class="nbk" onclick="go(\'home\')">&#8592; back</button><span class="ntit">ゆうこモード</span></div><div class="tabs"><div class="tab'+(t==='create'?' on':'')+'" onclick="ptab(\'create\')">作る</div><div class="tab'+(t==='manage'?' on':'')+'" onclick="ptab(\'manage\')">送った drops ('+(S.cards?S.cards.length:0)+')</div></div>'+(t==='create'?form:manage)+'</div>';
}

function onTypeChange(val){
  S._formTracks=val==='lyrics'?[]:null;
  S._fetchStatus=null;
  S._formType=val;
  // preserve title/url if already typed
  var tit=document.getElementById('ctit');
  var url=document.getElementById('curl');
  S._savedTit=tit?tit.value:'';
  S._savedUrl=url?url.value:'';
  render();
  if(tit=document.getElementById('ctit'))tit.value=S._savedTit||'';
  if(url=document.getElementById('curl'))url.value=S._savedUrl||'';
}

function fmt(cmd){
  document.getElementById('rte')&&document.getElementById('rte').focus();
  document.execCommand(cmd,false,null);
  updateToolbar();
}
function fmtColor(color){
  var rte=document.getElementById('rte');
  if(!rte)return;
  rte.focus();
  document.execCommand('styleWithCSS',false,true);
  document.execCommand('foreColor',false,color);
  updateToolbar();
}
function updateToolbar(){
  ['bold','italic','underline'].forEach(function(cmd){
    var btn=document.getElementById('rtb-'+cmd);
    if(btn)btn.classList.toggle('on',document.queryCommandState(cmd));
  });
}

function render(){
  var h='';
  if(S.view==='home')h=rHome();
  else if(S.view==='nf')h=rNF();
  else if(S.view==='nd')h=rND();
  else if(S.view==='pp')h=rPP();
  else if(S.view==='pm')h=rPM();
  else if(S.view==='ed')h=rED();
  document.getElementById('app').innerHTML=(S.toast?'<div class="toast">'+S.toast+'</div>':'')+h;
  // attach selectionchange for toolbar sync
  var rte=document.getElementById('rte');
  if(rte){
    document.addEventListener('selectionchange',updateToolbar);
    rte.addEventListener('keyup',updateToolbar);
  }
}

function go(v){
  if(v==='pm')S._formType=S._formType||'rule';
  S.view=v;render();
}
function openCard(id){S.sel=id;S.view='nd';render();}
function ptab(t){S.ptab=t;render();}
function addPin(d){if(S.pin.length<4){S.pin+=d;S.perr=false;if(S.pin.length===4)setTimeout(checkPin,120);else render();}}
function delPin(){if(S.pin.length>0){S.pin=S.pin.slice(0,-1);render();}}
function checkPin(){if(S.pin===PIN){S.perr=false;S.view='pm';S._formType='rule';S.ptab='create';S.pin='';}else{S.perr=true;S.pin='';}render();}
function clearFile(){S.pendingFile=null;render();}
function handleFile(e){
  var file=e.target.files[0];if(!file)return;
  if(file.size>5*1024*1024){alert('5MB以内のファイルを選んでください');return;}
  var reader=new FileReader();
  reader.onload=function(ev){
    S.pendingFile={name:file.name,data:ev.target.result,type:file.type.startsWith('image/')?'image':'pdf'};
    render();
  };
  reader.readAsDataURL(file);
}
function toggleTag(cid,tag){
  if(!S.tags[cid])S.tags[cid]=[];
  var i=S.tags[cid].indexOf(tag);
  if(i>=0)S.tags[cid].splice(i,1);else S.tags[cid].push(tag);
  saveT(cid);
}
function createCard(){
  var type=document.getElementById('ct').value;
  var title=(document.getElementById('ctit').value||'').trim();
  var url=(document.getElementById('curl').value||'').trim();
  var rich=isRich(type);
  var content='';var tracks=null;
  if(type==='lyrics'){
    // collect lyrics from DOM textareas (titles already in S._formTracks)
    var rows=document.querySelectorAll('.track-row');
    rows.forEach(function(row,i){
      var ta=row.querySelector('textarea');
      if(S._formTracks&&S._formTracks[i]&&ta)S._formTracks[i].lyrics=ta.value;
    });
    tracks=S._formTracks||[];
    if(!tracks.length)tracks=[];
  } else if(rich){
    var rte=document.getElementById('rte');
    content=rte?rte.innerHTML.trim():'';
  } else {
    var ta=document.getElementById('ccont');
    content=ta?(ta.value||'').trim():'';
  }
  if(!title){alert('タイトルを入力してください');return;}
  if(!rich&&!tracks)content=content.replace(/\r\n/g,'\n');
  var card={id:Date.now().toString(36)+Math.random().toString(36).slice(2),type:type,title:title,content:content,rich:rich,tracks:tracks,url:url||null,file:S.pendingFile||null,createdAt:Date.now()};
  S.pendingFile=null;S._formType='rule';S._formTracks=null;S._fetchStatus=null;
  save(card);
  S.toast='dropped!';render();
  setTimeout(function(){S.toast=null;render();},1800);
}
function delCard(id){
  if(!confirm('このカードを削除しますか？'))return;
  db.ref('drops/cards/'+id).remove();
  db.ref('drops/tags/'+id).remove();
  db.ref('drops/reactions/'+id).remove();
}
function updateTrackLyrics(i,v){
  if(!S._formTracks)return;
  S._formTracks[i].lyrics=v;
}

function fetchSCTracks(){
  var urlEl=document.getElementById('curl');
  var url=urlEl?urlEl.value.trim():'';
  if(!url){alert('SoundCloudのURLを入力してください');return;}
  if(!window.SC){alert('SoundCloud APIが読み込まれていません');return;}
  S._fetchStatus='読み込み中...';render();
  // restore url value after render
  setTimeout(function(){
    var el=document.getElementById('curl');if(el)el.value=url;
    var titEl=document.getElementById('ctit');if(titEl&&S._savedTit)titEl.value=S._savedTit;
    var iframe=document.getElementById('sc-hidden-iframe');
    if(!iframe)return;
    var embedUrl='https://w.soundcloud.com/player/?url='+encodeURIComponent(url)+'&auto_play=false';
    iframe.src=embedUrl;
    var widget=SC.Widget(iframe);
    widget.bind(SC.Widget.Events.READY,function(){
      widget.getSounds(function(sounds){
        if(!sounds||!sounds.length){
          S._fetchStatus='曲が見つかりませんでした';
          S._formTracks=[];
          render();
          setTimeout(function(){var el=document.getElementById('curl');if(el)el.value=url;},30);
          return;
        }
        S._formTracks=sounds.map(function(s,i){return{title:s.title||('Track '+(i+1)),lyrics:'',index:i};});
        S._fetchStatus=null;
        render();
        setTimeout(function(){
          var el=document.getElementById('curl');if(el)el.value=url;
          var titEl=document.getElementById('ctit');if(titEl&&S._savedTit)titEl.value=S._savedTit;
        },30);
      });
    });
  },80);
}

function togglePicker(){
  var p=document.getElementById('rpicker');
  if(p)p.classList.toggle('on');
}
function doReact(cid,emoji){
  saveReaction(cid,emoji);
  var p=document.getElementById('rpicker');
  if(p)p.classList.remove('on');
}
function setupSCWidget(cardId){
  if(!window.SC)return;
  var iframe=document.getElementById('sc-iframe');
  if(!iframe)return;
  var c=S.cards&&S.cards.find(function(x){return x.id===cardId;});
  if(!c||!c.tracks||!c.tracks.length)return;
  try{
    var widget=SC.Widget(iframe);
    function onTrackChange(){
      widget.getCurrentSound(function(sound){
        if(!sound)return;
        var title=sound.title||'';
        var bar=document.getElementById('sc-track-bar');
        var titleEl=document.getElementById('sc-track-title');
        var lyricsEl=document.getElementById('sc-lyrics-body');
        if(bar)bar.style.display='flex';
        if(titleEl)titleEl.textContent=title;
        if(lyricsEl){
          var track=c.tracks.find(function(t){
            return title.indexOf(t.title)>=0||t.title.indexOf(title)>=0||title===t.title;
          });
          if(!track){
            // fallback: match by current index
            widget.getCurrentSoundIndex(function(idx){
              var t2=c.tracks[idx];
              if(lyricsEl)lyricsEl.innerHTML=t2?(c.rich?t2.lyrics:'<span style="white-space:pre-wrap">'+esc(t2.lyrics)+'</span>'):'';
            });
          } else {
            lyricsEl.innerHTML=c.rich?track.lyrics:'<span style="white-space:pre-wrap">'+esc(track.lyrics)+'</span>';
          }
        }
      });
    }
    widget.bind(SC.Widget.Events.PLAY,onTrackChange);
    widget.bind(SC.Widget.Events.READY,onTrackChange);
  }catch(e){console.warn('SC Widget error:',e);}
}

S.reactions={};render();load();
</script>
</body>
</html>
